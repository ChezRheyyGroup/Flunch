<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chez Rheyy | Connexion Reseller</title>
    <link rel="stylesheet" href="css/h3k9p.css">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
</head>
<body class="login-body">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <main class="login-container">
        <div class="card">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h1>Chez Rheyy Reseller</h1>
                <p class="subtitle">Espace Privé & Sécurisé</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Identifiant</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Identifiant" required autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="•••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span>Accéder au Panel</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </button>
            </form>
        </div>
    </main>
    <div class="toast-container"></div>
    <script src="js/j7x2w.js"></script>
</body>
</html>
